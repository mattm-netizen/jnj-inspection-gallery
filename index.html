<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&J Equipment Rental - Inspection Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: white;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .error h2 {
            color: #ef4444;
            margin-bottom: 15px;
        }

        .error p {
            color: #666;
            line-height: 1.6;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 15px;
        }

        .photo-info h3 {
            color: #333;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .photo-info p {
            color: #666;
            font-size: 0.9rem;
        }

        .no-photos {
            background: white;
            border-radius: 12px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .no-photos h2 {
            color: #666;
            margin-bottom: 15px;
        }

        .no-photos p {
            color: #999;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }

        .lightbox-close:hover {
            color: #ccc;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 1rem;
            }

            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>J&J Equipment Rental</h1>
            <p id="subtitle">Inspection Photos</p>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading inspection photos...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Full size photo">
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const contractNumber = urlParams.get('contract');
        const invoiceNumber = urlParams.get('invoice');
        const API_BASE = 'https://rentalpro.jnjequipmentrental.com/api/public/inspection';

        // Update subtitle based on type
        if (contractNumber) {
            document.getElementById('subtitle').textContent = `Pre-Delivery Inspection - Contract ${contractNumber}`;
        } else if (invoiceNumber) {
            document.getElementById('subtitle').textContent = `Return Delivery Inspection - Invoice ${invoiceNumber}`;
        }

        // Fetch and display photos
        async function loadPhotos() {
            const content = document.getElementById('content');
            
            try {
                let url;
                if (contractNumber) {
                    url = `${API_BASE}/contract/${contractNumber}`;
                } else if (invoiceNumber) {
                    url = `${API_BASE}/invoice/${invoiceNumber}`;
                } else {
                    throw new Error('No contract or invoice number provided');
                }

                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Failed to load photos');
                }

                const data = await response.json();
                const photos = data.photos || [];

                if (photos.length === 0) {
                    content.innerHTML = `
                        <div class="no-photos">
                            <h2>No Photos Available</h2>
                            <p>No inspection photos have been uploaded for this ${contractNumber ? 'contract' : 'invoice'} yet.</p>
                        </div>
                    `;
                    return;
                }

                // Create photo grid
                const grid = document.createElement('div');
                grid.className = 'photo-grid';

                photos.forEach((photo, index) => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.onclick = () => openLightbox(photo.url);

                    card.innerHTML = `
                        <img src="${photo.url}" alt="${photo.filename}" loading="lazy">
                        <div class="photo-info">
                            <h3>Photo ${index + 1}</h3>
                            <p>${photo.filename}</p>
                        </div>
                    `;

                    grid.appendChild(card);
                });

                content.innerHTML = '';
                content.appendChild(grid);

            } catch (error) {
                console.error('Error loading photos:', error);
                content.innerHTML = `
                    <div class="error">
                        <h2>Unable to Load Photos</h2>
                        <p>There was an error loading the inspection photos. Please try again later or contact J&J Equipment Rental for assistance.</p>
                        <p style="margin-top: 15px; font-size: 0.9rem; color: #999;">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Lightbox functions
        function openLightbox(imageUrl) {
            document.getElementById('lightbox-img').src = imageUrl;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Close lightbox on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Close lightbox on background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });

        // Load photos on page load
        loadPhotos();
    </script>
</body>
</html>
